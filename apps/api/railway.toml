# =============================================================================
# NodeRail API — Railway config-as-code.
# https://docs.railway.com/reference/config-as-code
#
# Service setup on Railway:
#   * Create the "api" service in the same project as Postgres + Redis.
#   * Set the service Root Directory to the REPO ROOT (not apps/api) so the
#     Docker build context includes the pnpm lockfile + all workspace manifests.
#   * Point Config-as-code at apps/api/railway.toml (this file).
#   * Reference Railway plugins with variables:
#       DATABASE_URL = ${{Postgres.DATABASE_URL}}
#       REDIS_URL    = ${{Redis.REDIS_URL}}
#   * Railway injects PORT automatically; the app binds to it.
#
# Required env vars (see packages/config): DATABASE_URL, REDIS_URL,
# SESSION_SECRET, SECRETS_ENCRYPTION_KEY, PUBLIC_API_URL, PUBLIC_WEB_URL,
# ADMIN_EMAILS, CORS_ORIGINS, plus optional GITHUB_* / RATE_LIMIT_* / LOG_*.
# =============================================================================

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/api/Dockerfile"

[deploy]
# Apply DB migrations before the new version receives traffic. Runs inside the
# freshly built image (which ships the Prisma CLI + schema + migrations).
preDeployCommand = "pnpm --filter @noderail/db migrate:deploy"
startCommand = "node dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
numReplicas = 1
