# =============================================================================
# NodeRail web (Next.js) — Railway config-as-code TEMPLATE.
#
# This file lives in infra/railway/ because the web app is owned by another
# team. To use it, either:
#   (a) copy it to apps/web/railway.toml, OR
#   (b) set these values in the Railway service UI (Settings -> Build/Deploy).
#
# Service setup on Railway:
#   * Create the "web" service in the same project as api.
#   * Set the service Root Directory to the REPO ROOT.
#   * NEXT_PUBLIC_API_URL is a BUILD-TIME variable (Next inlines it into the
#     client bundle). Set it as a Railway build arg / service variable to your
#     public API URL, e.g. https://api.noderail.example.
#   * PORT is injected by Railway; the standalone server binds to it.
# =============================================================================

[build]
builder = "DOCKERFILE"
dockerfilePath = "infra/docker/web.Dockerfile"

# Make the public API URL available to the Docker build so Next can inline it.
[build.args]
NEXT_PUBLIC_API_URL = "${{NEXT_PUBLIC_API_URL}}"

[deploy]
startCommand = "node apps/web/server.js"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
numReplicas = 1
